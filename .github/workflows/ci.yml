name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Test
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml

      - name: Refresh coverage badge in branch
        if: github.event_name == 'push' && github.ref != 'refs/heads/main' && github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_coverage_badge.py coverage.xml .github/badges/coverage.svg
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.svg
          if git diff --cached --quiet; then
            echo "Coverage badge unchanged."
            exit 0
          fi

          git commit -m "Update coverage badge for branch"
          git push origin HEAD:${GITHUB_REF_NAME}
